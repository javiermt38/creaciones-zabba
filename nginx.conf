# Configuración de Nginx para Creaciones ZABBA
# Copiar este contenido al bloque 'server' de tu configuración de Nginx

# Compresión gzip
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

# Compresión Brotli (opcional, requiere módulo ngx_brotli)
# brotli on;
# brotli_comp_level 6;
# brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

# Caché para imágenes
location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
    expires 365d;
    add_header Cache-Control "public, immutable";
}

# Caché para CSS y JavaScript
location ~* \.(css|js)$ {
    expires 30d;
    add_header Cache-Control "public";
}

# Caché para fuentes
location ~* \.(woff|woff2|ttf|otf|eot)$ {
    expires 365d;
    add_header Cache-Control "public, immutable";
    add_header Access-Control-Allow-Origin "*";
}

# HTML - sin caché agresivo
location ~* \.html$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
}

# Remover headers innecesarios
server_tokens off;

# Headers de seguridad
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# CORS para fuentes Google
location ~* fonts\.(googleapis|gstatic)\.com {
    add_header Access-Control-Allow-Origin "*";
}

# Redireccionamiento HTTP a HTTPS (opcional)
# if ($scheme != "https") {
#     return 301 https://$server_name$request_uri;
# }

# Compresión de respuesta (si es una petición que no es estática)
location / {
    gzip on;
    gzip_types text/html application/json;
}
